<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>モニター</title>
    <style>
        body { margin: 0; background: #222; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #grid { display: grid; grid-template-columns: repeat(3, 2fr); grid-template-rows: repeat(2, 1fr); gap: 15px; flex-grow: 1; padding: 15px; }
        .card { background: white; border-radius: 10px; position: relative; display: flex; flex-direction: column; border: 4px solid #444; }
        .card.correct { border-color: red; background: #ffebeb; }
        .card.incorrect { border-color: blue; background: #ebebff; }
        .name { background: #444; color: white; text-align: center; padding: 10px; font-size: 1.5rem; }
        .img-layer { flex-grow: 1; width: 100%; object-fit: contain; }
        .mask { position: absolute; inset: 0; background: #333; color: white; display: flex; justify-content: center; align-items: center; font-size: 5rem; z-index: 10; }
        .hidden { display: none; }
        .mark { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; font-size: 10rem; opacity: 0.8; pointer-events: none; }
    </style>
</head>
<body>
    <div id="grid"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const grid = document.getElementById('grid');
        for(let i=0; i<6; i++) {
            grid.innerHTML += `
                <div class="card" id="card-${i}">
                    <div class="name" id="n-${i}">${i+1}: 待機中</div>
                    <div class="mask" id="m-${i}">?</div>
                    <div class="mark" id="mark-${i}"></div>
                    <img id="i-${i}" class="img-layer">
                </div>`;
        }

        socket.on('render', d => {
            const img = document.getElementById(`i-${d.index}`);
            if(img) img.src = d.image || "";
        });

        socket.on('update_users', u => {
            Object.values(u).forEach(user => {
                const nameTag = document.getElementById(`n-${user.index}`);
                if(nameTag) nameTag.innerText = `${user.index+1}: ${user.name}`;
            });
        });

        socket.on('visibility_update', v => {
            for(let i=0; i<6; i++) document.getElementById(`m-${i}`).className = v ? 'hidden' : 'mask';
        });

        socket.on('judge_results', res => {
            res.forEach((r, i) => {
                const card = document.getElementById(`card-${i}`);
                const mark = document.getElementById(`mark-${i}`);
                card.className = 'card'; mark.innerText = '';
                if(r === true) { card.classList.add('correct'); mark.innerText = '◯'; mark.style.color = 'red'; }
                if(r === false) { card.classList.add('incorrect'); mark.innerText = '✕'; mark.style.color = 'blue'; }
            });
        });

        socket.on('remote_clear_all', () => {
            for(let i=0; i<6; i++) document.getElementById(`i-${i}`).src = "";
        });
    </script>
</body>
</html>
