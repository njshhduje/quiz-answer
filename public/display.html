<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>モニター - Quiz</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 10px 30px; display: flex; justify-content: space-between; align-items: center; background: #333; }
        #timer { font-size: 3.5rem; color: #ffeb3b; }
        #grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); gap: 15px; flex-grow: 1; padding: 15px; }
        .card { background: white; border-radius: 10px; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .name-tag { background: #444; color: white; text-align: center; padding: 5px; font-size: 1.5rem; }
        .ans-img { flex-grow: 1; width: 100%; object-fit: contain; background: white; }
        .mask { position: absolute; inset: 40px 0 0 0; background: #444; display: flex; justify-content: center; align-items: center; font-size: 5rem; z-index: 5; transition: 0.5s; }
        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <header><div>QUIZ MONITOR</div><div id="timer">60</div></header>
    <div id="grid"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        for(let i=0; i<6; i++) {
            document.getElementById('grid').innerHTML += `<div class="card"><div class="name-tag" id="n-${i}">${i+1}: 待機中</div><div class="mask" id="m-${i}">?</div><img id="i-${i}" class="ans-img"></div>`;
        }
        socket.on('update_users', u => Object.values(u).forEach(user => document.getElementById(`n-${user.index}`).innerText = `${user.index+1}: ${user.name}`));
        socket.on('render', d => document.getElementById(`i-${d.index}`).src = d.image || "");
        socket.on('timer_update', t => document.getElementById('timer').innerText = t);
        socket.on('visibility_update', v => { for(let i=0; i<6; i++) document.getElementById(`m-${i}`).className = v ? 'mask hidden' : 'mask'; });
    </script>
</body>
</html>
