<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>QUIZ MONITOR - Minimal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0b10; --correct: #ff4757; --accent: #6366f1; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans JP', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 12vh; display: flex; justify-content: space-between; align-items: center; padding: 0 4rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-family: 'Inter'; font-size: 2rem; font-weight: 800; }
        #timer { font-family: 'Inter'; font-size: 4rem; font-weight: 800; }
        #grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); gap: 1.5rem; flex-grow: 1; padding: 2rem; }
        .card { background: #fff; border-radius: 20px; position: relative; display: flex; flex-direction: column; overflow: hidden; transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1); }
        .name-label { padding: 0.8rem; color: #1e293b; font-size: 1.3rem; font-weight: 900; text-align: center; border-bottom: 1px solid #eee; }
        .canvas-wrap { flex-grow: 1; position: relative; background: #fff; display: flex; justify-content: center; align-items: center; }
        .img-data { max-width: 85%; max-height: 85%; object-fit: contain; }
        .mask { position: absolute; inset: 0; background: #1e293b; color: #fff; display: flex; justify-content: center; align-items: center; font-size: 5rem; z-index: 10; transition: 0.6s; }
        .mask.hidden { opacity: 0; transform: scale(1.1); pointer-events: none; }
        /* 判定バッジ */
        .judge-badge { position: absolute; top: 10px; right: 10px; width: 70px; height: 70px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; z-index: 20; opacity: 0; transform: scale(0.5); transition: 0.3s; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .correct .judge-badge.maru { opacity: 1; transform: scale(1); color: var(--correct); border: 5px solid var(--correct); }
        .incorrect .judge-badge.batsu { opacity: 1; transform: scale(1); color: #2f3542; border: 5px solid #2f3542; }
        .card.correct { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(255,71,87,0.3); }
        .card.incorrect { opacity: 0.5; filter: grayscale(1); }
    </style>
</head>
<body>
    <header><div class="logo">THE QUIZ</div><div id="timer">60</div></header>
    <div id="grid"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        for(let i=0; i<6; i++) {
            document.getElementById('grid').innerHTML += `
                <div class="card" id="card-${i}">
                    <div class="name-label"><span style="color:var(--accent)">0${i+1}</span> <span id="n-${i}">PLAYER</span></div>
                    <div class="canvas-wrap">
                        <div class="mask" id="m-${i}">?</div>
                        <div class="judge-badge maru">○</div>
                        <div class="judge-badge batsu">×</div>
                        <img id="i-${i}" class="img-data">
                    </div>
                </div>`;
        }
        socket.on('render', d => { document.getElementById(`i-${d.index}`).src = d.image || ""; });
        socket.on('update_users', u => Object.values(u).forEach(user => { document.getElementById(`n-${user.index}`).innerText = user.name; }));
        socket.on('visibility_update', v => { for(let i=0; i<6; i++) document.getElementById(`m-${i}`).className = v ? 'mask hidden' : 'mask'; });
        socket.on('judge_results', res => {
            res.forEach((r, i) => {
                const c = document.getElementById(`card-${i}`);
                c.className = 'card';
                if(r === true) c.classList.add('correct');
                if(r === false) c.classList.add('incorrect');
            });
        });
        socket.on('timer_update', t => { const el = document.getElementById('timer'); el.innerText = t; el.style.color = t <= 10 ? 'var(--correct)' : '#fff'; });
        socket.on('remote_clear_all', () => { for(let i=0; i<6; i++) { document.getElementById(`i-${i}`).src = ""; document.getElementById(`card-${i}`).className = 'card'; } });
    </script>
</body>
</html>
