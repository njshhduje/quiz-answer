<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ADMIN</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .box { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 500px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; }
        .j-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .j-item { background: #eee; padding: 10px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>
    <div class="box">
        <button onclick="socket.emit('set_visibility', true)" style="background:#6366f1; font-size:1.2rem;">🚀 一斉オープン！</button>
        <button onclick="socket.emit('set_visibility', false)" style="background:#444;">🙈 隠す & ロック解除</button>
    </div>
    <div class="box">
        <input type="number" id="s" value="60" style="width:60px; font-size:1.5rem;"> 秒
        <button onclick="socket.emit('start_timer', document.getElementById('s').value)" style="background:#2196f3;">カウント開始</button>
        <button onclick="socket.emit('reset_timer', document.getElementById('s').value)" style="background:#999;">リセット</button>
    </div>
    <div class="box">
        <strong>◯✕判定</strong>
        <div class="j-grid" id="j-ui"></div>
        <button onclick="apply()" style="background:#ff4757;">判定を反映！</button>
    </div>
    <button onclick="if(confirm('次へ？')) socket.emit('clear_all')" style="background:#000; max-width:540px;">🧹 全回答消去して次問へ</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        for(let i=0; i<6; i++) document.getElementById('j-ui').innerHTML += `<div class="j-item">${i+1} <input type="checkbox" class="jc" data-idx="${i}"></div>`;
        function apply() {
            const res = Array(6).fill(false);
            document.querySelectorAll('.jc').forEach(c => { if(c.checked) res[c.dataset.idx] = true; });
            socket.emit('judge', res);
        }
    </script>
</body>
</html>
