<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理者 - Quiz</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f9f9f9; padding: 20px; }
        .panel { background: white; border: 2px solid #ddd; border-radius: 15px; padding: 20px; margin-bottom: 20px; max-width: 500px; margin-left: auto; margin-right: auto; }
        button { padding: 15px; margin: 5px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; width: 45%; }
        .open-btn { background: #673ab7; color: white; width: 92%; font-size: 1.5rem; }
    </style>
</head>
<body>
    <h1>Admin Panel</h1>
    <div class="panel">
        <h3>1. 全体アクション</h3>
        <button class="open-btn" onclick="socket.emit('set_visibility', true)">一斉オープン！</button><br>
        <button onclick="socket.emit('set_visibility', false)">隠す</button>
        <button onclick="socket.emit('set_lock', true)" style="background:red; color:white;">全員ロック</button>
        <button onclick="socket.emit('set_lock', false)" style="background:green; color:white;">ロック解除</button>
    </div>
    <div class="panel">
        <h3>2. タイマー</h3>
        <input type="number" id="sec" value="60" style="font-size:1.5rem; width:80px;"> 秒
        <button onclick="socket.emit('start_timer', document.getElementById('sec').value)" style="background:#2196F3; color:white;">開始</button>
    </div>
    <div class="panel">
        <h3>3. 個別/全消去</h3>
        <button onclick="socket.emit('clear_all')" style="background:#000; color:white; width:92%;">全員分を全消去</button>
        <div style="display:grid; grid-template-columns:repeat(3,1fr); margin-top:10px;">
            <button onclick="socket.emit('clear_specific', 0)">1消去</button>
            <button onclick="socket.emit('clear_specific', 1)">2消去</button>
            <button onclick="socket.emit('clear_specific', 2)">3消去</button>
            <button onclick="socket.emit('clear_specific', 3)">4消去</button>
            <button onclick="socket.emit('clear_specific', 4)">5消去</button>
            <button onclick="socket.emit('clear_specific', 5)">6消去</button>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>const socket = io();</script>
</body>
</html>
