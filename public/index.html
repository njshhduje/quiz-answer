<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>回答者 - QUIZ</title>
    <style>
        /* タッチによる画面揺れ・スクロールを完全に禁止 */
        html, body { 
            position: fixed; 
            width: 100%; 
            height: 100%; 
            margin: 0; 
            overflow: hidden; 
            touch-action: none; /* ブラウザ標準の動作を禁止 */
        }
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; }
        
        #login { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .toolbar { background: #333; padding: 10px; display: flex; gap: 8px; align-items: center; height: 60px; box-sizing: border-box; }
        .btn { flex: 1; height: 40px; border: none; border-radius: 8px; font-weight: bold; background: #eee; }
        .btn.active { background: #6366f1; color: white; }
        
        #canvas-container { flex-grow: 1; background: white; position: relative; }
        canvas { display: block; touch-action: none; } /* キャンバス上のタッチを独自制御 */

        #lock-overlay { 
            display: none; position: absolute; inset: 0; 
            background: rgba(0,0,0,0.8); z-index: 50; color: white; 
            justify-content: center; align-items: center; font-size: 1.5rem; 
        }
    </style>
</head>
<body>
    <div id="login">
        <input type="text" id="ni" placeholder="お名前" style="padding:15px; font-size:1.2rem; width:70%; border:2px solid #ddd; border-radius:10px;">
        <button onclick="join()" style="margin-top:20px; padding:15px 40px; background:#6366f1; color:white; border:none; border-radius:10px; font-weight:bold;">参加する</button>
    </div>

    <div id="lock-overlay">回答受付終了</div>

    <div class="toolbar">
        <button id="b-b" class="btn active" onclick="sm('brush')">筆</button>
        <button id="b-e" class="btn" onclick="sm('eraser')">消ゴム</button>
        <button class="btn" onclick="cls()" style="background:#ff4757; color:white;">全消去</button>
        <div id="t" style="margin-left:auto; color:#ffeb3b; font-size:1.5rem; font-weight:bold;">60</div>
    </div>

    <div id="canvas-container">
        <canvas id="c"></canvas>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let idx = null, mode = 'brush', lock = false, draw = false;
        const cvs = document.getElementById('c'), ctx = cvs.getContext('2d');

        function join() {
            const n = document.getElementById('ni').value;
            if(!n) return;
            socket.emit('join', { name: n });
            document.getElementById('login').style.display = 'none';
            initCanvas();
        }

        function initCanvas() {
            const container = document.getElementById('canvas-container');
            cvs.width = container.offsetWidth;
            cvs.height = container.offsetHeight;
            
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = 6;

            const getPos = (e) => {
                const rect = cvs.getBoundingClientRect();
                // タッチとマウス両方に対応
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            };

            const start = (e) => {
                if(lock || idx === null) return;
                draw = true;
                const p = getPos(e);
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                e.preventDefault(); // ブラウザのスクロール等を防止
            };

            const move = (e) => {
                if(!draw || lock) return;
                const p = getPos(e);
                ctx.globalCompositeOperation = mode === 'eraser' ? 'destination-out' : 'source-over';
                ctx.strokeStyle = mode === 'eraser' ? 'rgba(0,0,0,1)' : '#000';
                ctx.lineWidth = mode === 'eraser' ? 50 : 6;
                ctx.lineTo(p.x, p.y);
                ctx.stroke();
                e.preventDefault();
            };

            const stop = () => {
                if(draw) {
                    draw = false;
                    socket.emit('draw', { index: idx, image: cvs.toDataURL() });
                }
            };

            // タッチイベント
            cvs.addEventListener('touchstart', start, { passive: false });
            cvs.addEventListener('touchmove', move, { passive: false });
            cvs.addEventListener('touchend', stop);

            // マウスイベント (PC確認用)
            cvs.addEventListener('mousedown', start);
            cvs.addEventListener('mousemove', move);
            window.addEventListener('mouseup', stop);
        }

        function sm(m) {
            mode = m;
            document.getElementById('b-b').classList.toggle('active', m === 'brush');
            document.getElementById('b-e').classList.toggle('active', m === 'eraser');
        }

        function cls() {
            if(lock) return;
            ctx.clearRect(0, 0, cvs.width, cvs.height);
            socket.emit('draw', { index: idx, image: cvs.toDataURL() });
        }

        socket.on('assigned', d => { idx = d.index; });
        socket.on('lock_update', l => {
            lock = l;
            document.getElementById('lock-overlay').style.display = l ? 'flex' : 'none';
        });
        socket.on('timer_update', time => document.getElementById('t').innerText = time);
        socket.on('remote_clear_all', () => {
            ctx.clearRect(0, 0, cvs.width, cvs.height);
        });

        // 画面回転時などのサイズ補正
        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>
