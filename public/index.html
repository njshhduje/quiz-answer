<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>回答者 - Quiz</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f0f0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #login { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .toolbar { display: flex; gap: 5px; padding: 10px; background: #333; color: white; align-items: center; }
        canvas { background: white; touch-action: none; flex-grow: 1; }
        #lock-msg { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: 10; color: white; justify-content: center; align-items: center; font-size: 1.5rem; }
        #timer-box { margin-left: auto; color: #ffeb3b; font-weight: bold; }
        button { padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="login">
        <input type="text" id="nameIn" placeholder="名前" style="font-size:1.5rem; margin-bottom:10px;">
        <button onclick="join()" style="background:#4CAF50; color:white; font-size:1.2rem;">参加</button>
    </div>
    <div id="lock-msg">回答締め切り中</div>
    <div class="toolbar">
        <button onclick="mode='brush'">筆</button>
        <button onclick="mode='eraser'">消しゴム</button>
        <button onclick="cls()" style="background:#f44336; color:white;">消去</button>
        <button onclick="undo()">戻る</button>
        <span id="myName"></span>
        <div id="timer-box">60</div>
    </div>
    <canvas id="canvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myIdx = null, mode = 'brush', isLocked = false, drawing = false, history = [], step = -1;
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');

        function join() {
            const n = document.getElementById('nameIn').value;
            if(!n) return;
            socket.emit('join', { name: n });
            document.getElementById('login').style.display = 'none';
            document.getElementById('myName').innerText = " : " + n;
            init();
        }

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight - 60;
            ctx.lineWidth = 5; ctx.lineCap = 'round';
            const move = e => {
                if(!drawing || isLocked) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                ctx.globalCompositeOperation = mode === 'eraser' ? 'destination-out' : 'source-over';
                ctx.strokeStyle = '#000'; ctx.lineWidth = mode === 'eraser' ? 40 : 5;
                ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
            };
            canvas.onmousedown = canvas.ontouchstart = e => { if(isLocked) return; drawing = true; move(e); };
            window.onmouseup = window.ontouchend = () => { if(!drawing) return; drawing = false; ctx.beginPath(); save(); sync(); };
            window.onmousemove = window.ontouchmove = move;
            save();
        }
        function cls() { if(isLocked) return; ctx.clearRect(0,0,canvas.width,canvas.height); save(); sync(); }
        function save() { step++; if(step < history.length) history.length = step; history.push(canvas.toDataURL()); }
        function undo() { if(isLocked || step <= 0) return; step--; let img = new Image(); img.src = history[step]; img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); sync(); }; }
        function sync() { socket.emit('draw', { index: myIdx, image: canvas.toDataURL() }); }
        socket.on('assigned', d => myIdx = d.index);
        socket.on('lock_update', l => { isLocked = l; document.getElementById('lock-msg').style.display = l ? 'flex' : 'none'; });
        socket.on('timer_update', t => document.getElementById('timer-box').innerText = t);
        socket.on('remote_clear', i => { if(myIdx === i) { ctx.clearRect(0,0,canvas.width,canvas.height); history=[canvas.toDataURL()]; step=0; sync(); } });
    </script>
</body>
</html>
