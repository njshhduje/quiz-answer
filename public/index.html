<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>回答者</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f8f9fa; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #login { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .toolbar { background: #333; padding: 10px; display: flex; gap: 8px; align-items: center; color: white; height: 60px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: bold; background: #eee; }
        .btn.active { background: #6366f1; color: white; }
        canvas { background: white; touch-action: none; flex-grow: 1; }
        #lock-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; color: white; justify-content: center; align-items: center; font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>
    <div id="login">
        <input type="text" id="ni" placeholder="名前" style="padding:15px; font-size:1.2rem; border:2px solid #ddd; border-radius:8px; width:80%;">
        <button onclick="join()" style="margin-top:20px; padding:15px 40px; background:#6366f1; color:white; border:none; border-radius:8px;">参加する</button>
    </div>
    <div id="lock-overlay">THINKING TIME END</div>
    <div class="toolbar">
        <button id="b-b" class="btn active" onclick="sm('brush')">筆</button>
        <button id="b-e" class="btn" onclick="sm('eraser')">消ゴム</button>
        <button class="btn" onclick="cls()" style="background:#ff4757; color:white;">消去</button>
        <div id="t" style="margin-left:auto; color:#ffeb3b; font-size:1.5rem; font-weight:bold;">60</div>
    </div>
    <canvas id="c"></canvas>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(); let idx = null, mode = 'brush', lock = false, draw = false;
        const cvs = document.getElementById('c'), ctx = cvs.getContext('2d');
        function join() { const n = document.getElementById('ni').value; if(n){ socket.emit('join',{name:n}); document.getElementById('login').style.display='none'; init(); } }
        function init() {
            cvs.width = window.innerWidth; cvs.height = window.innerHeight - 60;
            ctx.lineWidth = 6; ctx.lineCap = 'round';
            const pos = e => { const r = cvs.getBoundingClientRect(); const x = (e.touches?e.touches[0].clientX:e.clientX)-r.left; const y = (e.touches?e.touches[0].clientY:e.clientY)-r.top; return {x,y}; };
            cvs.onmousedown = cvs.ontouchstart = e => { if(lock||idx===null) return; draw = true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); };
            window.onmousemove = window.ontouchmove = e => { if(!draw||lock) return; const p=pos(e); ctx.globalCompositeOperation = mode==='eraser'?'destination-out':'source-over'; ctx.lineWidth = mode==='eraser'?50:6; ctx.lineTo(p.x,p.y); ctx.stroke(); };
            window.onmouseup = window.ontouchend = () => { if(draw){ draw=false; socket.emit('draw',{index:idx, image:cvs.toDataURL()}); } };
        }
        function sm(m) { mode = m; document.getElementById('b-b').className=m==='brush'?'btn active':'btn'; document.getElementById('b-e').className=m==='eraser'?'btn active':'btn'; }
        function cls() { ctx.clearRect(0,0,cvs.width,cvs.height); socket.emit('draw',{index:idx, image:cvs.toDataURL()}); }
        socket.on('assigned', d => idx = d.index);
        socket.on('lock_update', l => { lock = l; document.getElementById('lock-overlay').style.display = l?'flex':'none'; });
        socket.on('timer_update', time => document.getElementById('t').innerText = time);
        socket.on('remote_clear_all', () => ctx.clearRect(0,0,cvs.width,cvs.height));
    </script>
</body>
</html>
