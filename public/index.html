<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>回答者 - QUIZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4CAF50; --danger: #f44336; --dark: #333; --bg: #f8f9fa; }
        body { margin: 0; background: var(--bg); font-family: 'Noto Sans JP', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        #login { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        #login h2 { color: var(--dark); margin-bottom: 20px; }
        #login input { width: 100%; max-width: 280px; padding: 15px; border: 2px solid #ddd; border-radius: 12px; font-size: 1.2rem; margin-bottom: 20px; outline: none; transition: 0.3s; }
        #login input:focus { border-color: var(--primary); }
        #login button { width: 100%; max-width: 310px; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #388E3C; }
        #login button:active { transform: translateY(2px); box-shadow: 0 2px 0 #388E3C; }

        .toolbar { background: var(--dark); padding: 10px; display: flex; gap: 8px; align-items: center; color: white; height: 60px; box-sizing: border-box; }
        .btn-tool { flex: 1; height: 40px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; background: #eee; font-size: 0.9rem; transition: 0.2s; }
        .btn-tool.active { background: var(--primary); color: white; }
        .btn-clear { background: var(--danger); color: white; }
        
        #timer-box { font-size: 1.5rem; color: #ffeb3b; font-weight: bold; min-width: 45px; text-align: center; }

        .canvas-area { flex-grow: 1; background: white; position: relative; }
        canvas { touch-action: none; width: 100%; height: 100%; }

        #lock-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; color: white; flex-direction: column; justify-content: center; align-items: center; }
        #lock-overlay span { font-size: 2rem; border: 4px solid white; padding: 10px 20px; transform: rotate(-5deg); font-weight: bold; }
    </style>
</head>
<body>
    <div id="login">
        <h2>QUIZ 参加</h2>
        <input type="text" id="nameInput" placeholder="お名前を入力">
        <button onclick="join()">準備OK！</button>
    </div>

    <div id="lock-overlay"><span>THINKING TIME END</span></div>

    <div class="toolbar">
        <button id="btn-brush" class="btn-tool active" onclick="setMode('brush')">筆</button>
        <button id="btn-eraser" class="btn-tool" onclick="setMode('eraser')">消ゴム</button>
        <button class="btn-tool btn-clear" onclick="cls()">全消去</button>
        <div id="timer-box">60</div>
    </div>

    <div class="canvas-area">
        <canvas id="canvas"></canvas>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myIndex = null, mode = 'brush', isLocked = false, drawing = false;
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');

        function join() {
            const n = document.getElementById('nameInput').value;
            if(!n) return;
            socket.emit('join', { name: n });
            document.getElementById('login').style.display = 'none';
            init();
        }

        function init() {
            const container = document.querySelector('.canvas-area');
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
            ctx.lineWidth = 5; ctx.lineCap = 'round';
            
            const start = e => { if(isLocked || myIndex === null) return; drawing = true; ctx.beginPath(); };
            const move = e => {
                if(!drawing || isLocked) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                ctx.globalCompositeOperation = mode === 'eraser' ? 'destination-out' : 'source-over';
                ctx.strokeStyle = '#000'; ctx.lineWidth = mode === 'eraser' ? 50 : 6;
                ctx.lineTo(x, y); ctx.stroke();
            };
            const stop = () => { if(!drawing) return; drawing = false; socket.emit('draw', { index: myIndex, image: canvas.toDataURL() }); };

            canvas.addEventListener('touchstart', start); canvas.addEventListener('touchmove', move);
            window.addEventListener('touchend', stop);
            canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move);
            window.addEventListener('mouseup', stop);
        }

        function setMode(m) {
            mode = m;
            document.getElementById('btn-brush').classList.toggle('active', m==='brush');
            document.getElementById('btn-eraser').classList.toggle('active', m==='eraser');
        }

        function cls() { ctx.clearRect(0,0,canvas.width,canvas.height); socket.emit('draw', { index: myIndex, image: canvas.toDataURL() }); }

        socket.on('assigned', d => { myIndex = d.index; });
        socket.on('lock_update', l => { isLocked = l; document.getElementById('lock-overlay').style.display = l ? 'flex' : 'none'; });
        socket.on('timer_update', t => document.getElementById('timer-box').innerText = t);
        socket.on('remote_clear_all', () => { ctx.clearRect(0,0,canvas.width,canvas.height); });
    </script>
</body>
</html>
