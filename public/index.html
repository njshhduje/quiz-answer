<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>回答者</title>
    <style>
        body { margin: 0; background: #f0f0f0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        #login { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .toolbar { display: flex; gap: 5px; padding: 10px; background: #333; color: white; align-items: center; }
        canvas { background: white; touch-action: none; flex-grow: 1; }
        #lock-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.7); z-index: 50; color: white; justify-content: center; align-items: center; font-size: 2rem; }
    </style>
</head>
<body>
    <div id="login">
        <input type="text" id="nameInput" placeholder="名前" style="font-size:1.2rem; padding:10px;">
        <button onclick="join()" style="margin-top:10px; padding:10px 20px;">参加</button>
    </div>
    <div id="lock-overlay">回答終了</div>
    <div class="toolbar">
        <button onclick="mode='brush'">筆</button>
        <button onclick="mode='eraser'">消しゴム</button>
        <button onclick="cls()">消去</button>
        <div id="timer-box" style="margin-left:auto; color:#ffeb3b; font-weight:bold;">60</div>
    </div>
    <canvas id="canvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myIndex = null, mode = 'brush', isLocked = false, drawing = false;
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');

        function join() {
            const n = document.getElementById('nameInput').value;
            if(!n) return;
            socket.emit('join', { name: n });
            document.getElementById('login').style.display = 'none';
            init();
        }

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight - 50;
            ctx.lineWidth = 5; ctx.lineCap = 'round';
            
            const start = e => { if(isLocked || myIndex === null) return; drawing = true; ctx.beginPath(); };
            const move = e => {
                if(!drawing || isLocked) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                ctx.globalCompositeOperation = mode === 'eraser' ? 'destination-out' : 'source-over';
                ctx.strokeStyle = '#000'; ctx.lineWidth = mode === 'eraser' ? 40 : 5;
                ctx.lineTo(x, y); ctx.stroke();
            };
            const stop = () => { 
                if(!drawing) return; drawing = false; 
                socket.emit('draw', { index: myIndex, image: canvas.toDataURL() }); 
            };

            canvas.addEventListener('touchstart', start); canvas.addEventListener('touchmove', move);
            window.addEventListener('touchend', stop);
            canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move);
            window.addEventListener('mouseup', stop);
        }

        function cls() { ctx.clearRect(0,0,canvas.width,canvas.height); socket.emit('draw', { index: myIndex, image: canvas.toDataURL() }); }

        socket.on('assigned', d => { myIndex = d.index; });
        socket.on('lock_update', l => { isLocked = l; document.getElementById('lock-overlay').style.display = l ? 'flex' : 'none'; });
        socket.on('timer_update', t => document.getElementById('timer-box').innerText = t);
        socket.on('remote_clear_all', () => { ctx.clearRect(0,0,canvas.width,canvas.height); });
    </script>
</body>
</html>
